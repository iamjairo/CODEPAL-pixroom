name: Release to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to verify and publish
        required: true
        type: string
      auth_mode:
        description: npm authentication mode (token is bootstrap-only)
        required: true
        default: token
        type: choice
        options:
          - token
          - oidc

env:
  RELEASE_TAG: ${{ inputs.tag }}
  NPM_AUTH_MODE: ${{ inputs.auth_mode }}

jobs:
  build:
    name: Verify and pack
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      PINPOINT_HEADROOM_AUTOSPAWN: "0"
      PINPOINT_LOG: silent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2
      - name: Validate release source
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
          test "$PACKAGE_NAME" = "@codepalaiorg/pinpoint"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"
          test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = "tag"
          test "$(git for-each-ref --format='%(taggeremail)' "refs/tags/$RELEASE_TAG")" = "<support@codepal.ai>"
          git config --local gpg.format ssh
          git config --local gpg.ssh.allowedSignersFile "$PWD/.github/release-allowed-signers"
          git verify-tag "$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = "$TAG_COMMIT"
          git fetch --no-tags origin "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$TAG_COMMIT" "origin/$DEFAULT_BRANCH"
      - run: npm ci --ignore-scripts
      - name: Install Spin model checker
        run: sudo apt-get update && sudo apt-get install -y spin
      - name: Check opaque-flow reference model
        run: npm run formal:opaque-flow
      - name: Check opaque-flow asynchronous model
        run: npm run formal:opaque-flow:async
      - run: npm run verify:release
      - name: Install Chromium for dashboard E2E
        run: npx playwright install --with-deps chromium
      - name: Test dashboard in Chromium
        run: npm run test:dashboard:e2e
      - name: Verify generated files are committed
        run: git diff --exit-code
      - name: Pack release artifact
        run: |
          mkdir -p release
          npm pack --ignore-scripts --pack-destination release
          test "$(find release -maxdepth 1 -name '*.tgz' | wc -l)" -eq 1
      - name: Generate production SBOM
        run: npm run sbom -- --out release/sbom.cdx.json
      - name: Checksum release artifact
        run: |
          curl --fail --silent --show-error --location \
            https://registry.npmjs.org/npm/-/npm-12.0.1.tgz \
            --output release/npm-12.0.1.tgz
          NPM_SHA512=$(openssl dgst -sha512 -binary release/npm-12.0.1.tgz | openssl base64 -A)
          test "$NPM_SHA512" = "L5T9i/YAQWQWqTS/xZxJkei/9zcu99hCeE4qi41IyBVV7mRQad3qc2JfuOktwmH+qwGI/V2rbCL+/UYxb1+RQA=="
          PACKAGE_TARBALL=$(find release -maxdepth 1 -name 'codepalaiorg-pinpoint-*.tgz' -print -quit)
          test -n "$PACKAGE_TARBALL"
          PACKAGE_SHA512=$(openssl dgst -sha512 -binary "$PACKAGE_TARBALL" | openssl base64 -A)
          printf 'sha512-%s\n' "$PACKAGE_SHA512" > release/PACKAGE_INTEGRITY
          cd release
          shasum -a 512 ./codepalaiorg-pinpoint-*.tgz ./sbom.cdx.json ./PACKAGE_INTEGRITY > SHA512SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-release
          path: release/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified package
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-release
          path: release
      - name: Verify release artifact
        run: |
          cd release
          shasum -a 512 -c SHA512SUMS
          test "$(find . -maxdepth 1 -name 'codepalaiorg-pinpoint-*.tgz' | wc -l)" -eq 1
          NPM_SHA512=$(openssl dgst -sha512 -binary npm-12.0.1.tgz | openssl base64 -A)
          test "$NPM_SHA512" = "L5T9i/YAQWQWqTS/xZxJkei/9zcu99hCeE4qi41IyBVV7mRQad3qc2JfuOktwmH+qwGI/V2rbCL+/UYxb1+RQA=="
          mkdir ../npm-cli
          tar -xzf npm-12.0.1.tgz -C ../npm-cli
          test "$(node ../npm-cli/package/bin/npm-cli.js --version)" = "12.0.1"
          PACKAGE_VERSION=${RELEASE_TAG#v}
          node -e '
            const fs = require("node:fs");
            const sbom = JSON.parse(fs.readFileSync("sbom.cdx.json", "utf8"));
            const version = process.argv[1];
            if (sbom.metadata?.component?.name !== "@codepalaiorg/pinpoint") throw new Error("invalid SBOM name");
            if (sbom.metadata?.component?.version !== version) throw new Error("invalid SBOM version");
            if (sbom.metadata?.component?.purl !== `pkg:npm/%40codepalaiorg/pinpoint@${version}`) throw new Error("invalid SBOM purl");
          ' "$PACKAGE_VERSION"
      - name: Resolve protected draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_ID=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq ".[] | select(.tag_name == \"$RELEASE_TAG\" and .draft == true) | .id" | head -1)
          test -n "$RELEASE_ID"
          test "$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .tag_name)" = "$RELEASE_TAG"
          test "$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .draft)" = "true"
          printf '%s\n' "$RELEASE_ID" > release/RELEASE_ID
      - name: Resolve npm authentication mode
        id: auth
        run: |
          AUTH_MODE="$NPM_AUTH_MODE"
          case "$AUTH_MODE" in
            token|oidc) ;;
            *) echo "unsupported NPM_AUTH_MODE: $NPM_AUTH_MODE" >&2; exit 1 ;;
          esac
          echo "mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"
          echo "npm authentication mode: $AUTH_MODE"
      - name: Verify bootstrap npm token
        if: steps.auth.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NPM_CLI="$PWD/npm-cli/package/bin/npm-cli.js"
          NPM_USER=$(node "$NPM_CLI" whoami)
          test "$NPM_USER" = "codepalaiorg"
          echo "authenticated npm user: $NPM_USER"
      - name: Check whether version is already published
        id: registry
        run: |
          NPM_CLI="$PWD/npm-cli/package/bin/npm-cli.js"
          PACKAGE_NAME='@codepalaiorg/pinpoint'
          PACKAGE_VERSION=${RELEASE_TAG#v}
          EXPECTED_INTEGRITY=$(cat release/PACKAGE_INTEGRITY)
          REGISTRY_OUTPUT=$(mktemp)
          REGISTRY_ERROR=$(mktemp)
          if node "$NPM_CLI" view "$PACKAGE_NAME@$PACKAGE_VERSION" dist.integrity --json >"$REGISTRY_OUTPUT" 2>"$REGISTRY_ERROR"; then
            PUBLISHED_INTEGRITY=$(node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); process.stdout.write(String(value));' "$REGISTRY_OUTPUT")
            test "$PUBLISHED_INTEGRITY" = "$EXPECTED_INTEGRITY"
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published with the verified artifact"
          elif grep -q 'E404' "$REGISTRY_ERROR"; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            cat "$REGISTRY_ERROR" >&2
            exit 1
          fi
      - name: Publish with bootstrap token
        if: steps.registry.outputs.published == 'false' && steps.auth.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NPM_CLI="$PWD/npm-cli/package/bin/npm-cli.js"
          PACKAGE_TARBALL=$(find "$PWD/release" -maxdepth 1 -name 'codepalaiorg-pinpoint-*.tgz' -print -quit)
          test -n "$PACKAGE_TARBALL"
          node "$NPM_CLI" publish "$PACKAGE_TARBALL" --access public --provenance --ignore-scripts
      - name: Publish with npm trusted publishing
        if: steps.registry.outputs.published == 'false' && steps.auth.outputs.mode == 'oidc'
        run: |
          NPM_CLI="$PWD/npm-cli/package/bin/npm-cli.js"
          PACKAGE_TARBALL=$(find "$PWD/release" -maxdepth 1 -name 'codepalaiorg-pinpoint-*.tgz' -print -quit)
          test -n "$PACKAGE_TARBALL"
          node "$NPM_CLI" publish "$PACKAGE_TARBALL" --access public --ignore-scripts
      - name: Attach verified release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_ID=$(cat release/RELEASE_ID)
          UPLOAD_URL=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            --jq '.upload_url | sub("\\{\\?name,label\\}$"; "")')
          test -n "$UPLOAD_URL"
          PACKAGE_TARBALL=$(find release -maxdepth 1 -name 'codepalaiorg-pinpoint-*.tgz' -print -quit)
          test -n "$PACKAGE_TARBALL"
          test "$(find release -maxdepth 1 -name 'codepalaiorg-pinpoint-*.tgz' | wc -l)" -eq 1
          for ASSET in "$PACKAGE_TARBALL" release/sbom.cdx.json release/PACKAGE_INTEGRITY release/SHA512SUMS; do
            NAME=$(basename "$ASSET")
            ASSET_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
              --jq ".[] | select(.name == \"$NAME\") | .id" | head -1)
            if test -n "$ASSET_ID"; then
              EXISTING=$(mktemp -d)
              gh api "repos/$GITHUB_REPOSITORY/releases/assets/$ASSET_ID" \
                -H 'Accept: application/octet-stream' > "$EXISTING/$NAME"
              cmp "$ASSET" "$EXISTING/$NAME"
            else
              curl --fail --silent --show-error --request POST \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                --header 'Content-Type: application/octet-stream' \
                --data-binary "@$ASSET" "$UPLOAD_URL?name=$NAME" >/dev/null
            fi
          done
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_ID=$(cat release/RELEASE_ID)
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false >/dev/null
