name: Release to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - name: Validate release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$GITHUB_REF_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version v$PACKAGE_VERSION" >&2
            exit 1
          fi
      - name: Check whether version is already published
        id: registry
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.registry.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install --global npm@latest
          npm publish --access public --provenance