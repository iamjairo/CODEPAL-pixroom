name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    env:
      PINPOINT_HEADROOM_AUTOSPAWN: "0"
      PINPOINT_LOG: silent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - if: matrix.node == 24
        name: Install Chromium for dashboard E2E
        run: npx playwright install --with-deps chromium
      - if: matrix.node == 24
        name: Test dashboard in Chromium
        run: npm run test:dashboard:e2e
      - if: matrix.node == 24
        name: Install Spin model checker
        run: sudo apt-get update && sudo apt-get install -y spin
      - if: matrix.node == 24
        name: Check opaque-flow reference model
        run: npm run formal:opaque-flow
      - if: matrix.node == 24
        name: Check opaque-flow asynchronous model
        run: npm run formal:opaque-flow:async
      - if: matrix.node == 24
        run: npm run bench:anthropic:self-test
      - if: matrix.node == 24
        run: npm run bench:qcv-quality

  platform-smoke:
    name: ${{ matrix.os }} smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      PINPOINT_HEADROOM_AUTOSPAWN: "0"
      PINPOINT_LOG: silent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run verify