name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    env:
      PINPOINT_HEADROOM_AUTOSPAWN: "0"
      PINPOINT_LOG: silent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run docs:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - if: matrix.node == 22
        run: npm run bench:anthropic:self-test
      - if: matrix.node == 22
        run: npm run bench:qcv-quality
      - run: node bin/cli.js --help
      - run: npm pack --dry-run